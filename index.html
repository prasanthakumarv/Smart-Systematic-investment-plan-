// ── UTILS ─────────────────────────────────────────────────────────────────────
function fmt(n,dec=0){
  if(Math.abs(n)>=10000000) return '₹'+(n/10000000).toFixed(2)+'Cr';
  if(Math.abs(n)>=100000) return '₹'+(n/100000).toFixed(2)+'L';
  if(Math.abs(n)>=1000) return '₹'+n.toLocaleString('en-IN',{maximumFractionDigits:dec});
  return '₹'+n.toFixed(dec);
}
function sipFV(m,r,n){const mr=r/12;return m*(((Math.pow(1+mr,n)-1)/mr)*(1+mr))}
function smartSipCalc(base,years,M){
  const n=years*12, GOLD=0.11, CAP=2.5;
  let tInv=0,tUnits=0,sInv=0,sUnits=0;
  const sH=[],stdH=[],invH=[],lbs=[];
  const step=Math.max(1,Math.floor(n/10));
  for(let i=1;i<=n;i++){
    const pRef=7000*Math.pow(1+GOLD/12,i);
    const noise=Math.sin(i*0.7)*0.06*pRef+Math.sin(i*1.9)*0.03*pRef;
    const pCurr=pRef+noise;
    const D=Math.max(0,(pRef-pCurr)/pRef);
    const iFinal=Math.min(base+base*D*M,base*CAP);
    tInv+=iFinal; tUnits+=iFinal/pCurr;
    sInv+=base; sUnits+=base/pCurr;
    if(i%step===0||i===n){
      sH.push(Math.round(tUnits*pCurr));
      stdH.push(Math.round(sUnits*pCurr));
      invH.push(Math.round(tInv));
      lbs.push(i<=12?i+'m':Math.round(i/12)+'y');
    }
  }
  const fP=7000*Math.pow(1+GOLD/12,n);
  const sFV=tUnits*fP, stdFV=sUnits*fP;
  return {smartFV:Math.round(sFV),stdFV:Math.round(stdFV),tInv:Math.round(tInv),sInv:Math.round(sInv),
    smartRet:((sFV/tInv-1)*100),stdRet:((stdFV/sInv-1)*100),
    adv:Math.round(sFV-stdFV),sH,stdH,invH,lbs,units:tUnits.toFixed(4)};
}
